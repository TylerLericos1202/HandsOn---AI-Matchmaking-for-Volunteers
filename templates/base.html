<!DOCTYPE html>
<html>
<head>
    <title>HandsOn | AI Volunteer Matchmaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">HandsOn <span class="brand-emoji">🤝</span></a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">Home</a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('profile') }}" class="nav-link">Profile</a>
            <a href="{{ url_for('logout') }}" class="nav-link nav-logout">Logout</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="nav-link">Login</a>
            <a href="{{ url_for('register') }}" class="nav-link nav-join">Join Free</a>
            {% endif %}
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash-msg flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
